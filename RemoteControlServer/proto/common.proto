syntax = "proto3";

package omnibox;

// =========================================================================================
// 协议格式: [TotalLen (4字节)] + [HeaderLen (2字节)] + [PacketHeader 字节流] + [Body 字节流]
// =========================================================================================

// =========================================================================================
// 1. 全局路由枚举 (MsgId)
// =========================================================================================
enum MsgId {
    ID_UNKNOWN            = 0;
    
    // ---------------- 心跳与登录 (1000 - 1999) ----------------
    ID_HEARTBEAT          = 1;
    ID_LOGIN_REQ          = 1001;                                               // 登录请求
    ID_LOGIN_RSP          = 1002;                                               // 登录响应

    // ---------------- 虚拟文件系统 MetaService (3000 - 3999) ----------------
    ID_CREATE_FOLDER_REQ  = 3001;                                               // 新建目录请求
    ID_CREATE_FOLDER_RSP  = 3002;                                               // 新建目录响应
    
    ID_DELETE_NODE_REQ    = 3003;                                               // 删除节点请求
    ID_DELETE_NODE_RSP    = 3004;                                               // 删除节点响应
    
    ID_CHECK_FILE_REQ     = 3005;                                               // 秒传/查岗请求
    ID_CHECK_FILE_RSP     = 3006;                                               // 秒传/查岗响应
    
    ID_RENAME_NODE_REQ    = 3007;                                               // 重命名节点请求
    ID_RENAME_NODE_RSP    = 3008;                                               // 重命名节点响应
    
    ID_MOVE_NODE_REQ      = 3009;                                               // 移动节点请求
    ID_MOVE_NODE_RSP      = 3010;                                               // 移动节点响应
    
    ID_LIST_DIR_REQ       = 3011;                                               // 拉取目录列表请求
    ID_LIST_DIR_RSP       = 3012;                                               // 拉取目录列表响应

    // ---------------- 文件传输服务 TransferService (4000 - 4999) ----------------
    ID_UPLOAD_CHUNK_REQ   = 4001;                                               // 文件碎片上传请求
    ID_UPLOAD_CHUNK_RSP   = 4002;                                               // 文件碎片上传响应
}

// =========================================================================================
// 2. 全局状态错误码 (ErrorCode)
// =========================================================================================
enum ErrorCode {
    ERR_SUCCESS           = 0;                                                  // 成功
    
    // ---------------- 登录与鉴权错误 (1 - 99) ----------------
    ERR_SERVER_INTERNAL   = 1;                                                  // 服务器内部错误/数据库异常
    ERR_WRONG_PWD         = 2;                                                  // 密码错误
    ERR_ACCOUNT_IN_USE    = 3;                                                  // 账号已在其他机器登录 (防多开)
    ERR_ACCOUNT_EXPIRED   = 4;                                                  // 账号授权已过期
    ERR_USER_NOT_FOUND    = 5;                                                  // 账号不存在
    ERR_ACCOUNT_BANNED    = 6;                                                  // 账号被封禁

    // ---------------- 虚拟文件系统错误 (300 - 399) ----------------
    ERR_NODE_NOT_FOUND    = 301;                                                // 目标文件或文件夹不存在
    ERR_NODE_EXISTED      = 302;                                                // 同名文件或文件夹已存在 (新建/重命名时触发)
    ERR_PERMISSION_DENIED = 303;                                                // 权限不足 (比如尝试删除别人的文件)
    ERR_INVALID_NAME      = 304;                                                // 非法的文件名 (包含特殊字符等)
    ERR_DIR_NOT_EMPTY     = 305;                                                // 目录非空无法直接删除 (如果你的删除逻辑是强校验的话)

    // ---------------- 文件传输底层错误 (400 - 499) ----------------
    ERR_CHUNK_CORRUPTED   = 401;                                                // 碎片数据损坏 (哈希校验未通过)
    ERR_DISK_FULL         = 402;                                                // 存储节点磁盘空间不足
    ERR_FILE_IO_FAILED    = 403;                                                // 碎片落盘写入失败 (可能没有文件权限或硬盘损坏)
    ERR_TRANSFER_TIMEOUT  = 404;                                                // 传输超时
}

// =========================================================================================
// 3. 核心通信包头
// =========================================================================================
message PacketHeader {
    MsgId     msg_id     = 1;                                                   // 【核心】消息ID路由
    uint64    seq_id     = 2;                                                   // 【复用】请求序列号 (可用于异步回调匹配)
    ErrorCode error_code = 3;                                                   // 【状态】0为成功，非0为错误
    string    error_msg  = 4;                                                   // 【提示】错误时的具体文本，可直接用于客户端弹窗
}

// =========================================================================================
// 4. 内网 RPC 消息头 (RpcHeader)
// 用于网关与后端微服务、微服务与微服务之间的内网通讯
// =========================================================================================
message RpcHeader 
{
    string service_name = 1;                                                    // 服务对象名。例如："omnibox.LoginService"
    string method_name = 2;                                                     // 具体的函数名。例如："Login"
    uint32 method_index = 3;                                                    // 方法索引
    uint32 args_size = 4;                                                       // 重点：紧跟在 Header 后面的参数序列化后的字节长度！
    uint64 seq_id = 5;                                                          // 请求序列号
}