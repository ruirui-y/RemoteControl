syntax = "proto3";

package ServerApi;

// =========================================================================================
// 协议格式: [TotalLen (4字节)] + [HeaderLen (2字节)] + [PacketHeader 字节流] + [Body 字节流]
// =========================================================================================

// =========================================================================================
// 1. 全局路由枚举 (MsgId)
// =========================================================================================
enum MsgId {
    ID_UNKNOWN                    = 0;                                                    // 未知消息ID

    // ---------------- 心跳与登录 (1000 - 1999) ----------------
    ID_HEARTBEAT                  = 1;                                                    // 心跳包
    ID_LOGIN_REQ                  = 1001;                                                 // 登录请求
    ID_LOGIN_RSP                  = 1002;                                                 // 登录响应

    // ---------------- 远程控制业务 (2000 - 2999) ----------------
    ID_SCREEN_FRAME               = 2001;                                                 // 被控端 -> 控制端：一帧截屏
    ID_CONTROL_CMD                = 2002;                                                 // 控制端 -> 被控端：操控指令
}

// =========================================================================================
// 2. 全局状态错误码 (ErrorCode)
// =========================================================================================
enum ErrorCode {
    ERR_SUCCESS                     = 0;                                                  // 成功
    
    // ---------------- 登录与鉴权错误 ----------------
    ERR_SERVER_INTERNAL             = 1;                                                  // 服务器内部错误
    ERR_WRONG_PWD                   = 2;                                                  // 账号不存在或密码错误
    ERR_ACCOUNT_IN_USE              = 3;                                                  // 账号已在其他机器登录 (防多开)
    ERR_ACCOUNT_EXPIRED             = 4;                                                  // 账号授权已过期
}

// =========================================================================================
// 3. 核心通信包头
// =========================================================================================
message PacketHeader {
    MsgId     msg_id                = 1;                                                  // 【核心】消息ID路由
    uint64    seq_id                = 2;                                                  // 【复用】请求序列号 (可用于异步回调匹配)
    ErrorCode error_code            = 3;                                                  // 【状态】0为成功，非0为错误
    string    error_msg             = 4;                                                  // 【提示】错误时的具体文本，可直接用于客户端弹窗
}

// =========================================================================================
// 4. 全局传输文件类型枚举 (FileType)
// =========================================================================================
enum FileType {
    FILE_UNKNOWN                    = 0;                                                  // 未知文件类型
    FILE_MOVIE                      = 1;                                                  // 影片相关文件 (视频、海报等)
    FILE_GAME                       = 2;                                                  // 游戏相关文件 (tar包、海报等)
}